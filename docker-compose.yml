services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      # Allow requests from the browser-facing web origin
      CORS_ORIGIN: "http://localhost:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Browser-side fetches hit the host's port 4000, which Docker forwards to
      # the api container. Keep this as localhost so it works from any browser.
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
